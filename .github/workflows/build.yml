# Build Workflow

name: Build with Gradle

on:
  pull_request:
  workflow_dispatch:
  push:

concurrency:
  group: ${{ github.head_ref || format('{0}-{1}', github.ref, github.run_number) }}
  cancel-in-progress: true

jobs:
  build:
    name: Build

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 10

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            **/loom-cache
            **/prebundled-jars
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Chmod Gradle
        run: chmod +x ./gradlew versions/26.1-fabric/gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Build (Forge + common)
        run: ./gradlew build --no-daemon

      - name: Set up JDK 25 (26.1 Fabric)
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      # Toolchain is fixed; sources still need a 26.1 API port (GuiGraphics, chat, commands, etc.).
      - name: Build (26.1 Fabric)
        continue-on-error: true
        working-directory: versions/26.1-fabric
        run: ./gradlew build --no-daemon